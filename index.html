<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Tracker Model</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080c10; --surface:#0d1117; --border:#1c2333; --border2:#253047;
  --text:#cdd9e5; --muted:#636e7b; --dim:#3d4b5c;
  --green:#3fb950; --green-dim:#1a3d22; --red:#f85149; --red-dim:#3d1a1a;
  --yellow:#d29922; --yellow-dim:#3d2e0a; --blue:#58a6ff; --blue-dim:#0d2447;
  --purple:#bc8cff; --cyan:#39c5cf;
  --font-mono:'Space Mono',monospace; --font-body:'DM Sans',sans-serif;
  --radius:6px; --radius-lg:10px;
}
html { font-size:14px; }
body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px); pointer-events:none; z-index:9999; }
header { background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; position:sticky; top:0; z-index:100; }
.logo { font-family:var(--font-mono); font-size:13px; font-weight:700; letter-spacing:0.15em; color:var(--blue); display:flex; align-items:center; gap:10px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-right { display:flex; align-items:center; gap:12px; }
.live-badge { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; border:1px solid var(--green); color:var(--green); font-family:var(--font-mono); font-size:11px; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:rgba(88,166,255,0.1); border:1px solid rgba(88,166,255,0.3); border-radius:var(--radius); color:var(--blue); font-family:var(--font-mono); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; }
.btn:hover { background:rgba(88,166,255,0.18); }
nav { display:flex; gap:2px; padding:0 24px; background:var(--surface); border-bottom:1px solid var(--border); }
.tab { padding:12px 18px; font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all 0.15s; position:relative; top:1px; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); }
main { padding:24px; max-width:1400px; margin:0 auto; }
.page { display:none; }
.page.active { display:block; }
.stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent,var(--blue)); opacity:0.7; }
.stat-label { font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.stat-value { font-family:var(--font-mono); font-size:22px; font-weight:700; color:var(--text); line-height:1; }
.stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.pos { color:var(--green)!important; }
.neg { color:var(--red)!important; }
.neu { color:var(--yellow)!important; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:20px; }
.panel-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
.panel-title { font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--blue); }
.panel-meta { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
.bet-table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead tr { background:rgba(255,255,255,0.02); }
th { font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:11px 14px; border-bottom:1px solid rgba(28,35,51,0.6); vertical-align:middle; white-space:nowrap; }
tbody tr:hover { background:rgba(88,166,255,0.04); }
tbody tr:last-child td { border-bottom:none; }
.conf { display:inline-block; padding:2px 8px; border-radius:4px; font-family:var(--font-mono); font-size:10px; font-weight:700; }
.conf-HIGH   { background:var(--green-dim); color:var(--green); border:1px solid rgba(63,185,80,0.3); }
.conf-MEDIUM { background:var(--yellow-dim); color:var(--yellow); border:1px solid rgba(210,153,34,0.3); }
.conf-LOW    { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }
.signals { display:flex; gap:4px; flex-wrap:wrap; }
.sig { display:inline-block; padding:2px 7px; border-radius:3px; font-family:var(--font-mono); font-size:9px; font-weight:700; }
.sig-SHARP { background:var(--blue-dim); color:var(--blue); border:1px solid rgba(88,166,255,0.25); }
.sig-RLM   { background:rgba(188,140,255,0.1); color:var(--purple); border:1px solid rgba(188,140,255,0.25); }
.sig-FADE  { background:rgba(57,197,207,0.1); color:var(--cyan); border:1px solid rgba(57,197,207,0.25); }
.sig-CLV   { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
.market-tag { display:inline-block; padding:2px 7px; border-radius:3px; font-family:var(--font-mono); font-size:9px; font-weight:700; background:rgba(255,255,255,0.05); color:var(--dim); border:1px solid var(--border); text-transform:uppercase; }
.odds-tag { font-family:var(--font-mono); font-size:13px; font-weight:700; }
.charts-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:20px; }
.chart-wrap { position:relative; padding:18px; height:280px; }
.chart-wrap canvas { max-height:240px; }
.signal-bars { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.sig-row { display:flex; flex-direction:column; gap:6px; }
.sig-row-header { display:flex; justify-content:space-between; align-items:center; }
.sig-name { font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text); }
.sig-stats { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
.bar-track { height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--muted); font-family:var(--font-mono); font-size:12px; gap:10px; }
.spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty { padding:48px; text-align:center; color:var(--muted); font-family:var(--font-mono); font-size:12px; line-height:2; }
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
.market-row { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; border-bottom:1px solid rgba(28,35,51,0.5); font-size:12.5px; }
.market-row:last-child { border-bottom:none; }
.market-name { font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--text); text-transform:uppercase; }
.market-stats { display:flex; gap:20px; font-family:var(--font-mono); font-size:11px; color:var(--muted); }
@media(max-width:900px){ .charts-grid{grid-template-columns:1fr} .stat-row{grid-template-columns:repeat(2,1fr)} main{padding:16px} }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>LINE TRACKER MODEL</div>
  <div class="header-right">
    <span id="last-updated" style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">—</span>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button class="btn" onclick="refreshAll()">↺ REFRESH</button>
  </div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('slate',this)">Today's Slate</button>
  <button class="tab" onclick="switchTab('charts',this)">Performance</button>
  <button class="tab" onclick="switchTab('metrics',thi
